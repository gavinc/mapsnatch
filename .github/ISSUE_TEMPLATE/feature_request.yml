name: Feature request
description: Suggest an improvement to the CLI
title: "[feat]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        For the **hosted web app** at mapsnatch.com, note that in the issue — this repo is CLI-only.

  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What pain are you solving? Who benefits?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: CLI flags, behavior, or UX you have in mind
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other tools, manual workflows, or "won't fix" reasons

  - type: dropdown
    id: api
    attributes:
      label: MindMeister API dependency
      description: Does this need a format/endpoint available on free/personal plans?
      options:
        - "Yes - must work without Business plan"
        - "Unknown - needs research"
        - "Business-only is acceptable"
    validations:
      required: true

  - type: checkboxes
    id: volunteer
    attributes:
      label: Contribution
      options:
        - label: I am willing to open a PR for this
        - label: I can help test a PR
