name: Bug report
description: Something broke or behaved wrong in the CLI
title: "[bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. **Do not paste your MindMeister personal access token.**
        For security issues, use [SECURITY.md](https://github.com/gavinc/mapsnatch/blob/main/SECURITY.md) instead.

  - type: input
    id: version
    attributes:
      label: MapSnatch version
      description: Output of `mapsnatch --version` or commit SHA
      placeholder: "0.1.0 or abc1234"
    validations:
      required: true

  - type: dropdown
    id: python
    attributes:
      label: Python version
      options:
        - "3.9"
        - "3.10"
        - "3.11"
        - "3.12"
        - "3.13"
        - other
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: OS
      options:
        - Linux
        - macOS
        - Windows
        - other
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal commands to reproduce
      placeholder: |
        1. mapsnatch --dry-run
        2. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / stderr
      description: Redact tokens and map titles if sensitive
      render: shell

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues
          required: true
        - label: I did not include my personal access token
          required: true
