name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and dev tools
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" ruff

      - name: Ruff lint
        run: ruff check src tests

      - name: Ruff format check
        run: ruff format --check src tests

      - name: Pytest
        run: python -m pytest -v

  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Audit production dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
          pip install -r requirements-prod.txt
          pip-audit -r requirements-prod.txt

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION=8.30.1
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" | tar -xz gitleaks
          chmod +x gitleaks

      - name: Scan repository for secrets
        run: ./gitleaks detect --source . --config .gitleaks.toml --verbose --redact --no-banner

  all-checks:
    name: ci
    needs: [lint-test, security-audit, secret-scan]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Require lint, test, dependency audit, and secret scan
        run: |
          test "${{ needs.lint-test.result }}" = "success"
          test "${{ needs.security-audit.result }}" = "success"
          test "${{ needs.secret-scan.result }}" = "success"
